version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: harris_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - harris_network
    depends_on:
      - db
      - redis
    environment:
      - PHP_OPCACHE_ENABLE=1

  nginx:
    image: nginx:1.25-alpine
    container_name: harris_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - harris_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: harris_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-harris_cars}
      MYSQL_USER: ${DB_USERNAME:-harris_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-harris_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - harris_db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - harris_network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: harris_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - harris_redis_data:/data
    networks:
      - harris_network
    command: redis-server --appendonly yes

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: harris_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    networks:
      - harris_network
    depends_on:
      - db

networks:
  harris_network:
    driver: bridge

volumes:
  harris_db_data:
    driver: local
  harris_redis_data:
    driver: local
